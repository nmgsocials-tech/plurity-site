<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Plurity — Underground rave collective." />

  <title>Plurity</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #060606;
      --surface:  #0f0f0f;
      --fg:       #f0ece6;
      --muted:    #4a4540;
      --accent:   #c084fc; /* violet */
      --glow:     rgba(192, 132, 252, 0.18);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Syne', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, var(--glow), transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.08); }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Main content ─────────────────────────────── */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
      max-width: 640px;
    }

    /* Thin rule above wordmark */
    .rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--muted));
    }

    /* Wordmark */
    .wordmark {
      font-size: clamp(3.5rem, 14vw, 8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: var(--fg);
      text-shadow: 0 0 80px var(--glow);
      user-select: none;
    }

    /* Tagline */
    .tagline {
      font-family: 'Syne Mono', monospace;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: var(--muted);
      opacity: 0.5;
    }

    /* Description */
    .description {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      line-height: 1.7;
      color: rgba(240, 236, 230, 0.45);
      max-width: 380px;
    }

    /* Links row */
    .links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: 'Syne Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .link:hover {
      color: var(--accent);
    }

    .link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Thin rule below */
    .rule-bottom {
      width: 1px;
      height: 60px;
      background: linear-gradient(to top, transparent, var(--muted));
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Syne Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.4;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="rule"></div>

    <h1 class="wordmark">PLURITY</h1>

    <p class="tagline">Underground Rave Collective</p>

    <div class="divider"></div>

    <p class="description">
      We curate underground electronic music experiences.<br />
      No dress code. No compromise.
    </p>

    <div class="links">
      <!-- Instagram -->
      <a class="link" href="https://www.instagram.com/plurity.co/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>

      </a>

      <!-- Email — update if you have one -->
      <a class="link" href="mailto:info@plurity.co">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
        info@plurity.co
      </a>
    </div>

    <div class="rule-bottom"></div>
  </div>

  <p class="footer">plurity.co &nbsp;·&nbsp; events</p>

</body>
</html>
