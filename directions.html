<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Plurity — EDC Directions" />
  <title>Plurity — EDC Directions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #060606;
      --fg:     #f0ece6;
      --muted:  #4a4540;
      --accent: #f548b4;
      --glow:   rgba(245, 72, 180, 0.18);
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Syne', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 40% at 50% 20%, var(--glow), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 900px;
      padding: 2rem 2rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back {
      font-family: 'Syne Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back:hover { color: var(--accent); }

    .header-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
    }

    main {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 900px;
      padding: 1rem 2rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      flex: 1;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-family: 'Syne Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pdf-container {
      width: 100%;
      flex: 1;
      min-height: 75vh;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      overflow: hidden;
    }

    .pdf-container iframe {
      width: 100%;
      height: 100%;
      min-height: 75vh;
      border: none;
      display: block;
    }

    .download-row {
      display: flex;
      justify-content: flex-end;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(245,72,180,0.3);
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
    }

    .download-btn:hover {
      background: rgba(245,72,180,0.08);
      border-color: var(--accent);
    }

    .download-btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <header>
    <a class="back" href="/">← plurity.co</a>
    <span class="header-title">Plurity</span>
  </header>

  <main>
    <div>
      <h1>EDC Directions</h1>
      <p class="subtitle">Getting there</p>
    </div>

    <div class="download-row">
      <a class="download-btn" href="directions.pdf" download>
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 8h14v2H5z"/></svg>
        Download PDF
      </a>
    </div>

    <div class="pdf-container">
      <iframe src="directions.pdf" title="EDC Directions"></iframe>
    </div>
  </main>

</body>
</html>
